name: Autograde

# Runs the test suite on every push so graders see a pass/fail at a glance, and
# renders a screenshot of index.html. Each run saves a timestamped screenshot
# under submission/ and links it from the run summary. Works on private repos;
# no GitHub Pages needed.
on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # lets the preview step commit the screenshot back

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: npx vitest run --reporter=default --reporter=json --outputFile=test-results.json

      # ---- Page preview (never affects the grade) -------------------------
      - name: Install browser for preview
        if: always()
        continue-on-error: true
        run: |
          npm i -D playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Render page preview
        if: always()
        continue-on-error: true
        run: |
          TS=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          echo "TS=$TS" >> "$GITHUB_ENV"
          mkdir -p submission
          cat > shot.mjs <<'EOF'
          import { chromium } from 'playwright'
          import { pathToFileURL } from 'node:url'
          const out = process.argv[2] || 'page-preview.png'
          const browser = await chromium.launch()
          try {
            const page = await browser.newPage({ viewport: { width: 1024, height: 800 } })
            await page.goto(pathToFileURL('index.html').href, { waitUntil: 'load', timeout: 15000 }).catch(() => {})
            await page.screenshot({ path: out, fullPage: true })
          } finally {
            await browser.close()
          }
          EOF
          node shot.mjs "submission/$TS.png"

      - name: Commit preview
        if: always()
        continue-on-error: true
        run: |
          [ -n "$TS" ] && [ -f "submission/$TS.png" ] || exit 0
          git config user.name "course-bot"
          git config user.email "course-bot@users.noreply.github.com"
          git add submission
          git diff --cached --quiet && { echo "no preview change"; exit 0; }
          git commit -m "📸 Page preview $TS [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Write grading summary
        if: always()
        run: |
          node <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          let r;
          try { r = JSON.parse(fs.readFileSync('test-results.json', 'utf8')); }
          catch { console.log('## ❌ Tests did not run (build/install error)'); process.exit(0); }

          const tests = r.testResults.flatMap(f => f.assertionResults);
          const passed = tests.filter(t => t.status === 'passed').length;
          const total = tests.length;

          console.log(`## ${passed === total ? '✅' : '❌'} ${passed} / ${total} tests passed`);
          console.log('');
          console.log('| Result | Test |');
          console.log('| --- | --- |');
          for (const t of tests) {
            const icon = t.status === 'passed' ? '✅' : '❌';
            console.log(`| ${icon} | ${t.fullName || t.title} |`);
          }
          const ts = process.env.TS;
          if (ts) {
            const url = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/blob/${process.env.GITHUB_REF_NAME}/submission/${ts}.png`;
            console.log('');
            console.log(`📸 **Page preview:** [view rendered \`index.html\` (${ts})](${url})`);
          }
          EOF
